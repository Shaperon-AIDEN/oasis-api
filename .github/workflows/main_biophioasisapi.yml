# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - biophioasisapi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: shaperon.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8618BC513DF8463D83C9F48D37D609CD }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_209192FA722448B4AE62CD7A471FA691 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: shaperon.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8618BC513DF8463D83C9F48D37D609CD }}/oasis-api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EC4E4E718C364B59BA8707AFCFD7DB38 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_316D7E4A504C44A694117A385FF329C7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_17971C00576D41AF9A01A213B1944618 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'biophioasisapi'
          slot-name: 'Production'
          images: 'shaperon.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8618BC513DF8463D83C9F48D37D609CD }}/oasis-api:${{ github.sha }}'
          