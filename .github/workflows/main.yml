name: Build and deploy container app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: https://shaperon.azurecr.io/
          username: ${{ secrets.AzureAppService_ContainerUsername }}
          password: ${{ secrets.AzureAppService_ContainerPassword }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: |
            shaperon.azurecr.io/oasis-api:${{ github.sha }}
            shaperon.azurecr.io/oasis-api:latest
          file: ./Dockerfile

      - name: Trigger Azure Web App restart via webhook
        run: |
          curl -X POST "${{ secrets.AZURE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error && echo "Webhook triggered successfully"
